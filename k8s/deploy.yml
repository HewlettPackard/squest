- name: "Deploy Squest"
  hosts: localhost
  gather_facts: false
  module_defaults:
    kubernetes.core.k8s:
      kubeconfig: "{{ squest_k8s_kubeconfig_path }}"
    kubernetes.core.k8s_info:
      kubeconfig: "{{ squest_k8s_kubeconfig_path }}"
    kubernetes.core.helm:
      kubeconfig: "{{ squest_k8s_kubeconfig_path }}"

  pre_tasks:

    - when: squest_k8s_kubeconfig_path is undefined
      name: 'Fail if squest_k8s_kubeconfig_path is not defined'
      ansible.builtin.fail:
        msg: 'Please make sure you set squest_k8s_kubeconfig_path'

    - when:
        - squest_django_ssh_private_key_path is undefined
        - squest_django.externalize_backup_via_rsync.enabled | bool
      name: 'Fail if squest_django_ssh_private_key_path is not defined'
      ansible.builtin.fail:
        msg: 'Please make sure you set squest_django_ssh_private_key_path'

  roles:
    - role: squest_k8s
