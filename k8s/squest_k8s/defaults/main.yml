# Kubernetes

squest_k8s_cluster_fqdn: "k8s.domain.local"  # used to build ingress URL like squest.k8s.domain.local
squest_k8s_kubeconfig_path: ".kube/kubeconfig"
squest_k8s_create_namespace: true
squest_k8s_namespace: "squest"
squest_k8s_storage_class: "thin"

# Squest dependencies

squest_charts_registry_name: registry-1.docker.io
squest_charts_repository_name: bitnamicharts
squest_image_registry_name: docker.io
squest_image_repository_name: bitnamilegacy

squest_mariadb_chart_version: 20.5.6
squest_mariadb_chart_ref: "oci://{{ squest_charts_registry_name }}/{{ squest_charts_repository_name }}/mariadb"
squest_phpmyadmin_chart_version: 18.1.8
squest_phpmyadmin_chart_ref: "oci://{{ squest_charts_registry_name }}/{{ squest_charts_repository_name }}/phpmyadmin"
squest_rabbitmq_chart_version: 16.0.3
squest_rabbitmq_chart_ref: "oci://{{ squest_charts_registry_name }}/{{ squest_charts_repository_name }}/rabbitmq"
squest_redis_chart_version: 21.1.7
squest_redis_chart_ref: "oci://{{ squest_charts_registry_name }}/{{ squest_charts_repository_name }}/redis"
squest_django_image: "quay.io/hewlettpackardenterprise/squest:latest"
squest_nginx_image: nginx:1.23.4-alpine

# 01-db

squest_db:
  database: "squest"
  user: "squest"
  # password: "squest"   # by default taken from the mariadb secret
  # existing secret. Need to contain keys: mariadb-root-password and mariadb-password
  # existing_secret: secret_name

# MariaDB chart https://artifacthub.io/packages/helm/bitnami/mariadb
squest_mariadb:
  # -- enable integrated MariaDB™ subchart from Bitnami
  enabled: true
  helm_values:
    global:
      security:
        allowInsecureImages: true
    image:
      registry: "{{ squest_image_registry_name }}"
      repository: "{{ squest_image_repository_name }}/mariadb"
    auth:
      # -- The database name to be used when using the integrated MariaDB database.
      database: squest
      # -- The password credential to be used when using the integrated MariaDB database.
      password: squest
      # -- The root password credential to be used when using the integrated MariaDB database.
      rootPassword: p@ssw0rd
      # -- The username credential to be used when using the integrated MariaDB database.
      username: squest

# PHPMYADMIN Helm chart https://artifacthub.io/packages/helm/bitnami/phpmyadmin
squest_phpmyadmin:
  enabled: true
  helm_values:
    global:
      security:
        allowInsecureImages: true
    image:
      registry: "{{ squest_image_registry_name }}"
      repository: "{{ squest_image_repository_name }}/phpmyadmin"
    ingress:
      enabled: true
      hostname: "phpmyadmin.{{ squest_k8s_cluster_fqdn }}"
      ingressClassName: "nginx"
      annotations:
        ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

# 02-rabbitmq

squest_rabbitmq_secret:
  user: rabbitmq
  password: rabbitmq
  erlang_cookie: this_is_a_cookie
  # existing secret. Need to contain keys: rabbitmq-erlang-cookie and rabbitmq-password
  # existing_secret: secret_name

# RabbitMQ Bitnami chart https://artifacthub.io/packages/helm/bitnami/rabbitmq
squest_rabbitmq:
  enabled: true
  helm_values:
    global:
      security:
        allowInsecureImages: true
      storageClass: "{{ squest_k8s_storage_class }}"
    image:
      registry: "{{ squest_image_registry_name }}"
      repository: "{{ squest_image_repository_name }}/rabbitmq"
    auth:
      username: "{{ squest_rabbitmq_secret.user }}"
      password: "{{ squest_rabbitmq_secret.password }}"
    extraSecrets:
      load-definition:
        load_definition.json: |
          {
            "users": [
              {
                "name": "rabbitmq",
                "password": "rabbitmq",
                "tags": "administrator"
              }
            ],
            "vhosts": [
              {
                "name": "/"
              },
              {
                "name": "squest"
              }
            ],
            "permissions":[
              {
                  "user": "rabbitmq",
                  "vhost": "squest",
                  "configure": ".*",
                  "read": ".*",
                  "write": ".*"
              }
            ]
          }
    loadDefinition:
      enabled: true
      existingSecret: load-definition
    extraConfiguration: |
      load_definitions = /app/load_definition.json

# 03-redis

squest_redis_secret:
  password: redis_secret_password
  # existing_secret: secret_name

# Redis Bitnami chart: https://artifacthub.io/packages/helm/bitnami/redis
squest_redis:
  enabled: true
  helm_values:
    global:
      security:
        allowInsecureImages: true
    image:
      registry: "{{ squest_image_registry_name }}"
      repository: "{{ squest_image_repository_name }}/redis"
    architecture: standalone
    auth:
      password: squest

# 05-django

squest_django_ssh_private_key_path: ""  # used by backup
squest_django:
  image: "{{ squest_django_image }}"
  extra_labels: {}
  ingress:
    enabled: true
    host: "squest.{{ k8s_cluster_fqdn }}"
    classname: nginx
    annotations:
      ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  ldap:  # extra ldap config
    enabled: false
    ldap_config_file: "{{ lookup('file', playbook_dir + '/../Squest/ldap_config.py') }}"
  env:  # squest settings
    TZ: "Europe/Paris"
    DB_HOST: "mariadb"
    DB_PORT: "3306"
    DB_USER: "{{ squest_db.user }}"
    DB_DATABASE: "{{ squest_db.database }}"
    REDIS_CACHE_HOST: "redis-master"
    DEBUG: "false"
    RABBITMQ_HOST: "rabbitmq"
    RABBITMQ_VHOST: "squest"
    RABBITMQ_PORT: "5672"
  # non-mandatory secrets. environment variables set as secret in squest-secret
  # do not set default secret:  DB_PASSWORD, REDIS_CACHE_PASSWORD and RABBITMQ_PASSWORD
#  env_secrets:
#    EMAIL_HOST_PASSWORD: "my-secret-password"
#    METRICS_AUTHORIZATION_PASSWORD: ""
#    SECRET_KEY: ""
#    DEFAULT_ADMIN_TOKEN: ""
#    DEFAULT_ADMIN_PASSWORD: ""
#    AUTH_LDAP_BIND_PASSWORD: ""
  # non mandatory secret can be set via an existing secret created manually
  # env_secrets_existing_secret: "my-secret-name"
  backup: # backup squest db and media to a PVC
    enabled: false
    crontab: "0 1 * * *"
  externalize_backup_via_rsync:  # rsync backup files into and external server
    enabled: false
    crontab: "30 1 * * *"
    private_ssh_key: "{{ lookup('file', squest_django_ssh_private_key_path) + '\n' }}"
    ssh_user: "squest_k8s_dev"
    ssh_server: "ssh-backup.domain.local"
    remote_path: "/backup/squest_k8s_dev/"
  pvc:
    django-static:
      storage_class_name: "{{ squest_k8s_storage_class }}"
      size: "1Gi"
    django-media:
      storage_class_name: "{{ squest_k8s_storage_class }}"
      size: "1Gi"
    squest-backup:
      storage_class_name: "{{ squest_k8s_storage_class }}"
      size: "1Gi"
